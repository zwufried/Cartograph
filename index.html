      const cx2 = sel.pts.reduce((a,b)=>a+b.x,0)/sel.pts.length;
      const cy2 = sel.pts.reduce((a,b)=>a+b.y,0)/sel.pts.length;
      const startDist = Math.hypot(x-cx2, y-cy2);
      setScalingZone({ ...selectedZone, origPts:sel.pts.map(p=>({...p})), cx:cx2, cy:cy2, startDist: Math.max(startDist, 1) });
      return;
    }
    // Check for label scale handle hit
    if (tool === "move" && selectedLabel) {
      const lb = (world.labels||[]).find(l => l.id === selectedLabel);
      if (lb) {
        const size = lb.size || 16;
        // Approximate text width for handle positions (use a rough estimate)
        const tw = lb.text.length * size * 0.55;
        const th = size * 1.4;
        const pad = 6;
        const bx = lb.x - tw/2 - pad, by = lb.y - th/2 - pad;
        const bw = tw + pad*2, bh = th + pad*2;
        const handles = [[bx,by],[bx+bw,by],[bx+bw,by+bh],[bx,by+bh]];
        const h = handles.find(([hx,hy]) => Math.hypot(x-hx, y-hy) < 12/zoom);
        if (h) {
          saveUndo();
          const startDist = Math.hypot(x-lb.x, y-lb.y);
          setScalingLabel({ id: lb.id, startSize: size, startDist: Math.max(startDist, 1), cx: lb.x, cy: lb.y });
          return;
        }
      }
    }
    // Check zones and rivers before deciding to pan
    const overZone = (tool === "move" && !overIcon && !overLabel) ? (
      [...(world.polygons||[])].reverse().find(p => ptInPoly(x, y, p.pts)) ||
      [...(world.zones||[])].reverse().find(z => ptInPoly(x, y, z.pts)) ||
      [...(world.waterZones||[])].reverse().find(z => ptInPoly(x, y, z.pts))
    ) : null;
    const hitThreshold = 8 / zoom;
    const overRiver = (tool === "move" && !overIcon && !overLabel && !overZone) ? (
      [...(world.rivers||[])].reverse().find(r => {
        if (!r.pts || r.pts.length < 2) return false;
        for (let i=0; i<r.pts.length-1; i++) {
          const a=r.pts[i], b=r.pts[i+1];
          const dx=b.x-a.x, dy=b.y-a.y, len=Math.sqrt(dx*dx+dy*dy);
          if (len===0) continue;
          const t=Math.max(0,Math.min(1,((x-a.x)*dx+(y-a.y)*dy)/(len*len)));
          const px2=a.x+t*dx-x, py2=a.y+t*dy-y;
          if (Math.sqrt(px2*px2+py2*py2) < hitThreshold) return true;
        }
        return false;
      })
    ) : null;
    const shouldPan = e.button === 1
      || (e.button === 0 && e.altKey)
      || (e.button === 0 && tool === "move" && !overIcon && !overLabel && !overZone && !overRiver);
    if (shouldPan) {
      e.preventDefault();
      isPanning.current = true;
      hasPanned.current = false;
      panStart.current = { mx: e.clientX, my: e.clientY, px: pan.x, py: pan.y };
      if (tool === "move") { setSelectedZone(null); setSelectedRiver(null); setSelectedLabel(null); }
      return;
    }
    if (tool === "move" && overLabel) { saveUndo(); setSelectedLabel(overLabel.id); setMovingLabel({ label: overLabel, offX: x - overLabel.x, offY: y - overLabel.y }); return; }
    if (tool === "move" && overIcon) { saveUndo(); setMovingIcon({ icon: overIcon, offX: x - overIcon.x, offY: y - overIcon.y }); return; }
    if (tool === "move" && overZone) {
      saveUndo();
      const isPoly = !!(world.polygons||[]).find(p => p.id === overZone.id);
      const isWater = !isPoly && !!(world.waterZones||[]).find(z => z.id === overZone.id);
      const type = isPoly ? "polygon" : isWater ? "waterZone" : "zone";
      setSelectedZone({ id: overZone.id, type });
      setSelectedRiver(null);
      setMovingZone({ type, id: overZone.id, offX: x, offY: y });
      return;
    }
    if (tool === "move" && overRiver) {
      saveUndo();
      setSelectedRiver(overRiver.id);
      setSelectedZone(null);
      setMovingRiver({ id: overRiver.id, offX: x, offY: y });
      return;
    }
    if (tool === "river") { setIsRivering(true); setRiverPts([{ x, y }]); }
    // Allow dragging in-progress polygon points
    if ((tool === "polygon" || tool === "zone") && currentPoly) {
      const snapDist = 10 / zoom;
      const ptIdx = currentPoly.pts.findIndex(p => Math.hypot(x - p.x, y - p.y) < snapDist);
      if (ptIdx >= 0) { setDragPolyPt({ index: ptIdx }); }
    }
  };

  const handleMouseMove = e => {
    // Panning takes priority
    if (isPanning.current && panStart.current) {
      const dx = e.clientX - panStart.current.mx, dy = e.clientY - panStart.current.my;
      // Only register as a pan if moved more than 3px (avoids suppressing accidental micro-moves)
      if (Math.hypot(dx, dy) > 3) hasPanned.current = true;
      setPan({ x: panStart.current.px + dx, y: panStart.current.py + dy });
      if (canvasRef.current) canvasRef.current.style.cursor = "grabbing";
      return;
    }
    const { x, y } = getXY(e);
    setMousePos({ x: Math.round(x), y: Math.round(y) });
    if (viewMode === "planet" && planetDrag.current) {
      const dx = e.clientX - planetDrag.current.x, dy = e.clientY - planetDrag.current.y;
      if (planetDrag.current.isOrbitalRot) {
        const orbId = planetDrag.current.isOrbitalRot;
        const baseRot = planetDrag.current.r;
        updateWorld(world.id, { orbitals: (world.orbitals||[]).map(o => o.id===orbId
          ? { ...o, rot: { x: 0, y: baseRot.y + dx*0.005 } }
          : o) });
      } else if (planetDrag.current.isCubeMap) {
        const orig = planetDrag.current.origOffset;
        const R = Math.min(800,600) * 0.37 * planetZoom;
        updateWorld(world.id, { cubeMapOffset: { u: orig.u + dx/(R*1.4), v: orig.v + dy/(R*1.4) } });
      } else if (planetDrag.current.isCameraPan) {
        setCameraOffset({ x: planetDrag.current.origOffset.x + dx, y: planetDrag.current.origOffset.y + dy });
      } else if (planetDrag.current.isPlanetMove) {
        // Move only the planet — stars and camera stay fixed
        setPlanetOffset({ x: planetDrag.current.origOffset.x + dx, y: planetDrag.current.origOffset.y + dy });
      } else {
        // Camera orbit: drag right = planet rotates right (grab-and-pull)
        const sensitivity = 0.005 / Math.max(0.5, planetZoom);
        const newLat = planetDrag.current.r.lat - dy * sensitivity;
        const newLon = planetDrag.current.r.lon - dx * sensitivity;
        setCamera({ ...planetDrag.current.r, lat: newLat, lon: newLon });
      }
      return;
    }
    if (draggingStar) {
      const r2 = canvasRef.current.getBoundingClientRect();
      const mx2 = e.clientX - r2.left, my2 = e.clientY - r2.top;
      const dx2 = (mx2 - draggingStar.startMx) / planetZoom;
      const dy2 = (my2 - draggingStar.startMy) / planetZoom;
      updateWorld(world.id, { stars: (world.stars||[]).map(s => s.id===draggingStar.id
        ? world.toScale
          ? { ...s,
              scaleX: draggingStar.origX + dx2,
              scaleY: draggingStar.origY + dy2,
              // If syncScalePos is on, also update decorative coords
              ...(world.syncScalePos ? { x: draggingStar.origX + dx2, y: draggingStar.origY + dy2 } : {})
            }
          : { ...s, x: draggingStar.origX + dx2, y: draggingStar.origY + dy2 }
        : s) });
      return;
    }
    if (draggingOrbital) {
      const r2 = canvasRef.current.getBoundingClientRect();
      const mx = e.clientX - r2.left, my = e.clientY - r2.top;
      const dx = (mx - draggingOrbital.startX) / planetZoom;
      const dy = (my - draggingOrbital.startY) / planetZoom;
      updateWorld(world.id, { orbitals: (world.orbitals||[]).map(o => o.id===draggingOrbital.id
        ? world.toScale
          ? { ...o,
              scalePosX: draggingOrbital.origPosX + dx,
              scalePosY: draggingOrbital.origPosY + dy,
              ...(world.syncScalePos ? { posX: draggingOrbital.origPosX + dx, posY: draggingOrbital.origPosY + dy } : {})
            }
          : { ...o, posX: draggingOrbital.origPosX + dx, posY: draggingOrbital.origPosY + dy }
        : o) });
      return;
    }
    if (movingIcon) {
      updateWorld(world.id, { icons: (world.icons || []).map(ic => ic.id === movingIcon.icon.id ? { ...ic, x: x - movingIcon.offX, y: y - movingIcon.offY } : ic) }); return;
    }
    if (movingLabel) {
      updateWorld(world.id, { labels: (world.labels || []).map(lb => lb.id === movingLabel.label.id ? { ...lb, x: x - movingLabel.offX, y: y - movingLabel.offY } : lb) }); return;
    }
    if (scalingLabel) {
      const dist = Math.hypot(x-scalingLabel.cx, y-scalingLabel.cy);
      const newSize = Math.max(6, Math.round(scalingLabel.startSize * dist / scalingLabel.startDist));
      updateWorld(world.id, { labels: (world.labels||[]).map(l => l.id===scalingLabel.id ? {...l, size:newSize} : l) });
      return;
    }
    if (scalingZone) {
      const { id, type, origPts, cx: cx2, cy: cy2, startDist } = scalingZone;
      const dist = Math.hypot(x-cx2, y-cy2);
      const scale = startDist > 0 ? dist/startDist : 1;
      const newPts = origPts.map(p => ({ x: cx2+(p.x-cx2)*scale, y: cy2+(p.y-cy2)*scale }));
      if (type === "zone") updateWorld(world.id, { zones: (world.zones||[]).map(z=>z.id===id?{...z,pts:newPts}:z) });
      else if (type === "waterZone") updateWorld(world.id, { waterZones: (world.waterZones||[]).map(z=>z.id===id?{...z,pts:newPts}:z) });
      else updateWorld(world.id, { polygons: (world.polygons||[]).map(p=>p.id===id?{...p,pts:newPts}:p) });
      return;
    }
    if (movingZone) {
      const dx = x - movingZone.offX, dy = y - movingZone.offY;
      const updatedMz = { ...movingZone, offX: x, offY: y };
      setMovingZone(updatedMz);
      const clampPts = pts => {
        const moved = pts.map(p=>({x:p.x+dx,y:p.y+dy}));
        const minX = Math.min(...moved.map(p=>p.x));
        const maxX = Math.max(...moved.map(p=>p.x));
        const minY = Math.min(...moved.map(p=>p.y));
        const maxY = Math.max(...moved.map(p=>p.y));
        const cx2 = minX < 0 ? -minX : maxX > 800 ? 800-maxX : 0;
        const cy2 = minY < 0 ? -minY : maxY > 600 ? 600-maxY : 0;
        return moved.map(p=>({x:p.x+cx2,y:p.y+cy2}));
      };
      if (movingZone.type === "zone") {
        updateWorld(world.id, { zones: (world.zones||[]).map(z => z.id===movingZone.id ? {...z, pts:clampPts(z.pts)} : z) });
      } else if (movingZone.type === "waterZone") {
        updateWorld(world.id, { waterZones: (world.waterZones||[]).map(z => z.id===movingZone.id ? {...z, pts:clampPts(z.pts)} : z) });
      } else {
        updateWorld(world.id, { polygons: (world.polygons||[]).map(p => p.id===movingZone.id ? {...p, pts:clampPts(p.pts)} : p) });
      }
      return;
    }
    if (movingRiver) {
      const dx = x - movingRiver.offX, dy = y - movingRiver.offY;
      setMovingRiver({ ...movingRiver, offX: x, offY: y });
      updateWorld(world.id, { rivers: (world.rivers||[]).map(r => r.id===movingRiver.id ? {...r, pts:r.pts.map(p=>({x:p.x+dx,y:p.y+dy}))} : r) });
      return;
    }
    if (dragPolyPt !== null && currentPoly) {
      setCurrentPoly(p => {
        const pts = [...p.pts];
        pts[dragPolyPt.index] = { x, y };
        return { ...p, pts };
      });
      return;
    }
    if (isRivering && riverPts) {
      const last = riverPts[riverPts.length - 1];
      // River point threshold also zoom-aware
      if (Math.hypot(x - last.x, y - last.y) > 5 / zoom) setRiverPts(p => [...p, { x, y }]);
    }
    if (tool === "move") {
      const ic = hitIcon(x, y); if (ic !== hovIcon) setHovIcon(ic);
      if (canvasRef.current) canvasRef.current.style.cursor = ic ? "grab" : "grab";
    }
  };

  const handleMouseUp = () => {
    if (isPanning.current && canvasRef.current) {
      // Reset to appropriate cursor for current tool
      const toolCursor = { polygon:"crosshair", zone:"crosshair", move:"grab", travel:"cell", label:"text", river:"crosshair" }[tool] || "default";
      canvasRef.current.style.cursor = toolCursor;
    }
    isPanning.current = false; panStart.current = null;
    planetDrag.current = null; setDraggingOrbital(null); setDraggingStar(null); setMovingIcon(null); setMovingLabel(null); setMovingZone(null); setMovingRiver(null); setScalingZone(null); setScalingLabel(null); setDragPolyPt(null);
    if (isRivering && riverPts && riverPts.length > 2) {
      saveUndo(); updateWorld(world.id, { rivers: [...(world.rivers || []), { pts: riverPts, id: newId() }] });
    }
    setIsRivering(false); setRiverPts(null);
  };

  const handleContextMenu = e => {
    e.preventDefault();
    const { x: wx, y: wy } = getXY(e);
    const { x: sx, y: sy } = getScreenXY(e);

    // In planet mode: right-click on a star opens edit modal
    if (viewMode === "planet") {
      const c = canvasRef.current;
      const W = c.width/2, H = c.height/2;
      const r2 = canvasRef.current.getBoundingClientRect();
      const mx2 = e.clientX - r2.left, my2 = e.clientY - r2.top;
      const sCX = W*0.38 + cameraOffset.x, sCY = H*0.5 + cameraOffset.y;
      const hitStar = (world.stars||[]).find(star => {
        const st = STAR_TYPES.find(s=>s.id===star.type)||STAR_TYPES[0];
        const scaleM = world.toScale ? 0.18 : 1;
        const sx2 = world.toScale
          ? sCX + (star.scaleX ?? star.x) * planetZoom
          : sCX + star.x * planetZoom;
        const sy2 = world.toScale
          ? sCY + (star.scaleY ?? star.y) * planetZoom
          : sCY + star.y * planetZoom;
        return Math.hypot(mx2-sx2, my2-sy2) < (star.size||1)*planetZoom*scaleM*st.coronaSize*0.65;
      });
      if (hitStar) { setEditingStar({...hitStar}); return; }
      return;
    }
    // Check in-progress polygon point right-click
    if ((tool === "polygon" || tool === "zone") && currentPoly && currentPoly.pts.length > 3) {
      const snapDist = 10 / zoom;
      const ptIdx = currentPoly.pts.findIndex(p => Math.hypot(wx - p.x, wy - p.y) < snapDist);
      if (ptIdx >= 0) { setCtxMenu({ x: sx, y: sy, polyPtIdx: ptIdx }); return; }
    }
    // Hit-test placed icons and user labels
    const ic = hitIcon(wx, wy), lb = hitLabel(wx, wy);
    if (ic || lb) { setCtxMenu({ x: sx, y: sy, ic, lb }); return; }
    // Hit-test polygon/zone/waterZone — works even without a name
    const hitPoly = (world.polygons||[]).find(p => p.pts?.length > 2 && ptInPoly(wx, wy, p.pts));
    const hitZone = !hitPoly && [...(world.zones||[]),...(world.waterZones||[])].find(z => z.pts?.length > 2 && ptInPoly(wx, wy, z.pts));
    if (hitPoly || hitZone) {
      setCtxMenu({ x: sx, y: sy, shapeLbl: hitPoly || hitZone, shapeType: hitPoly ? "polygon" : "zone" });
      return;
    }
    // Hit-test rivers
    const hitThresh = 8 / zoom;
    const hitRiver = (world.rivers||[]).find(r => {
      if (!r.pts || r.pts.length < 2) return false;
      for (let i=0; i<r.pts.length-1; i++) {
        const a=r.pts[i], b=r.pts[i+1];
        const dx=b.x-a.x, dy=b.y-a.y, len=Math.sqrt(dx*dx+dy*dy);
        if (len===0) continue;
        const t=Math.max(0,Math.min(1,((wx-a.x)*dx+(wy-a.y)*dy)/(len*len)));
        const px2=a.x+t*dx-wx, py2=a.y+t*dy-wy;
        if (Math.sqrt(px2*px2+py2*py2) < hitThresh) return true;
      }
      return false;
    });
    if (hitRiver) { setCtxMenu({ x: sx, y: sy, river: hitRiver }); return; }
  };

  const handleWheel = e => {
    e.preventDefault();
    if (viewMode === "planet") {
      setPlanetZoom(z => Math.max(0.4, Math.min(3, z * (e.deltaY < 0 ? 1.1 : 0.9))));
      return;
    }
    const r = canvasRef.current.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    const factor = e.deltaY < 0 ? 1.12 : 0.89;
    const newZoom = Math.max(0.15, Math.min(10, zoom * factor));
    // Zoom toward mouse position
    setPan(p => ({
      x: mx - (mx - p.x) * (newZoom / zoom),
      y: my - (my - p.y) * (newZoom / zoom),
    }));
    setZoom(newZoom);
  };

  const handleDrop = e => {
    e.preventDefault(); const data = e.dataTransfer.getData("text/plain"); if (!data) return;
    const def = JSON.parse(data); const { x, y } = getXY(e);
    saveUndo(); updateWorld(world.id, { icons: [...(world.icons || []), { ...def, x, y, id: newId(), name: "" }] });
  };

  const addCustomType = () => {
    if (!customDraft.name.trim()) return;
    const nt = { ...customDraft, id: "custom_" + newId(), name: customDraft.name.trim() };
    if (customDraft.cat === "terrain") updateWorld(world.id, { terrainZoneTypes: [...(world.terrainZoneTypes || DEFAULT_TERRAIN_ZONES), nt] });
    else if (customDraft.cat === "water") updateWorld(world.id, { waterZoneTypes: [...(world.waterZoneTypes || DEFAULT_WATER_ZONES), nt] });
    else updateWorld(world.id, { landmarkTypes: [...(world.landmarkTypes || DEFAULT_LANDMARK_TYPES), nt] });
    setShowCustom(false);
    setCustomDraft({ name: "", glyph: "⭐", cat: "landmark", color: "#888", zoneColor: "#aaa" });
  };

  const terrainZones = world.terrainZoneTypes || DEFAULT_TERRAIN_ZONES;
  const waterZones = world.waterZoneTypes || DEFAULT_WATER_ZONES;
  const natureIcons = world.natureIcons || DEFAULT_NATURE_ICONS;
  const landmarkTypes = world.landmarkTypes || DEFAULT_LANDMARK_TYPES;
  const cursorStyle = viewMode === "planet" ? "grab" : ({ polygon:"crosshair", zone:"crosshair", move:"grab", travel:"cell", label:"text", river:"crosshair" }[tool] || "default");

  const statusMsg = () => {
    if (viewMode === "planet") return selectedOrbital
      ? "Drag to move body · Alt+drag to rotate its surface · double-click to open editor"
      : (world.planetShape||"sphere")==="cube"
        ? "Drag to orbit · Shift+drag to slide map patch · double-click orbital to edit"
        : "Drag to orbit around planet · click a body to select · double-click to edit";
    if (tool === "river") return isRivering ? "Drawing — release to finish" : "Click & drag to draw a river";
    if (tool === "polygon" || tool === "zone") {
      if (!currentPoly) return "Click to start placing polygon points";
      return `${currentPoly.pts.length} pts — drag points to adjust · right-click a point to delete · double-click or click first point to close`;
    }
    if (tool === "travel") return travelPts.length === 0 ? "Click to place Point A" : travelPts.length === 1 ? "Click to place Point B" : "Travel calculated — click anywhere to reset";
    if (tool === "move") return "Drag to pan · Drag an icon or label to move it · Drag inside a zone to reposition it · Right-click to rename or delete";
    if (tool === "label") return "Click the map to place a text label";
    return "";
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:760, background:T.ui.bg, fontFamily:T.font, color:T.ui.text, userSelect:"none", position:"relative" }}>
      {/* TOOLBAR */}
      <div style={{ display:"flex", alignItems:"center", gap:5, padding:"5px 10px",
        borderBottom:`1px solid ${T.ui.border}`, background:T.ui.panel, flexWrap:"wrap", minHeight:44 }}>
        <Btn T={T} onClick={onBack} style={{ fontSize:11, padding:"3px 8px" }}>{backLabel || "← Worlds"}</Btn>
        {onBackToOverview && (
          <Btn T={T} onClick={onBackToOverview} style={{ fontSize:11, padding:"3px 8px" }}>← Overview</Btn>
        )}
        <span style={{ fontSize:13, fontWeight:600 }}>{world.name}</span>
        {viewMode === "planet" && (
          <input value={world.planetName||""} onChange={e=>updateWorld(world.id,{planetName:e.target.value})}
            placeholder="Planet label…" maxLength={40}
            style={{ fontSize:11, padding:"2px 7px", border:`1px solid ${T.ui.border}`, borderRadius:5, background:T.ui.bg, color:T.ui.text, width:110, fontFamily:T.font }} />
        )}
        <div style={{ width:1, height:18, background:T.ui.border, margin:"0 2px" }} />
        <div style={{ display:"flex", gap:3, opacity: viewMode==="planet" ? 0.35 : 1, pointerEvents: viewMode==="planet" ? "none" : "auto" }}>
        {[
          { id:"polygon", icon:"⬟", label:"Land" },
          { id:"zone", icon:"▧", label:"Zone" },
          { id:"river", icon:"〰", label:"River" },
          { id:"move", icon:"✥", label:"Move" },
          { id:"label", icon:"T", label:"Label" },
          { id:"travel", icon:"⇝", label:"Travel" },
        ].map(tb => (
          <button key={tb.id}
            onClick={() => { setTool(tb.id); if (tb.id === "polygon") setDrawMode("landmass"); if (tb.id !== "travel") { setTravelPts([]); setTravelResult(null); } }}
            style={{ padding:"3px 7px", fontSize:11, border:`1px solid ${tool===tb.id?T.ui.accent:T.ui.border}`,
              borderRadius:5, background:tool===tb.id?T.ui.accent:"transparent",
              color:tool===tb.id?T.ui.accentText:T.ui.text, cursor:"pointer", fontFamily:T.font,
              display:"flex", alignItems:"center", gap:3 }}>
            <span style={{ fontSize:12 }}>{tb.icon}</span>{tb.label}
          </button>
        ))}
        </div>
        <div style={{ width:1, height:18, background:T.ui.border, margin:"0 2px" }} />
        <label style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, cursor:"pointer", color:T.ui.muted,
          opacity: viewMode==="planet" ? 0.4 : 1, pointerEvents: viewMode==="planet" ? "none" : "auto" }}>
          <input type="checkbox" checked={smooth} onChange={e => setSmooth(e.target.checked)} style={{ margin:0 }} />Smooth
        </label>
        <Btn T={T} onClick={viewMode==="planet" ? undo3D : undo} style={{ fontSize:11, padding:"3px 7px",
          opacity: (viewMode==="planet" ? undo3DStack.length===0 : undoStack.length===0) ? 0.4 : 1 }}>↩ Undo</Btn>
        <Btn T={T} onClick={viewMode==="planet" ? redo3D : redo} style={{ fontSize:11, padding:"3px 7px",
          opacity: (viewMode==="planet" ? redo3DStack.length===0 : redoStack.length===0) ? 0.4 : 1 }}>↪ Redo</Btn>
        <Btn T={T} onClick={() => { if (confirm("Clear map?")) { saveUndo(); updateWorld(world.id, { polygons:[], zones:[], waterZones:[], rivers:[], icons:[], labels:[] }); }}} style={{ fontSize:11, padding:"3px 7px" }}>🗑 Clear</Btn>
        <Btn T={T} onClick={() => {
          const c = canvasRef.current; if (!c) return;

                      const baseOx = world.toScale ? (orb.scalePosX ?? (orb.posX ?? W*0.78)) : (orb.posX ?? W*0.78);
                      const baseOy = world.toScale ? (orb.scalePosY ?? (orb.posY ?? H*0.28)) : (orb.posY ?? H*0.28);
                      // Use a fixed comfortable zoom, then pan so orbital is at screen centre.
                      // At zoom z with cameraOffset cx:
                      //   mainCX = W*0.38 + cx
                      //   orbX = mainCX + (baseOx - mainCX)*z = mainCX*(1-z) + baseOx*z
                      // We want orbX = W*0.5:
                      //   (W*0.38+cx)*(1-z) + baseOx*z = W*0.5
                      //   cx = (W*0.5 - baseOx*z)/(1-z) - W*0.38
                      // Use z=2 for a close-up view
                      // Move camera to orbital without changing zoom - just pan
                      // Keep current planetZoom, only adjust cameraOffset
                      const z = planetZoom;
                      let cx, cy;
                      if (Math.abs(z - 1) < 0.001) {
                        // At zoom=1 orbital is at baseOx regardless of cx, need slight zoom
                        const z2 = 1.5;
                        cx = (W*0.5 - baseOx*z2)/(1-z2) - W*0.38;
                        cy = (H*0.5 - baseOy*z2)/(1-z2) - H*0.5;
                        setPlanetZoom(z2);
                      } else {
                        cx = (W*0.5 - baseOx*z)/(1-z) - W*0.38;

            <div style={{ fontSize:11, color:T.ui.muted, lineHeight:1.6, padding:"8px 10px", background:T.ui.bg, borderRadius:6, border:`0.5px solid ${T.ui.border}` }}>

          <div style={{ borderTop:`1px solid ${T.ui.border}`, paddingTop:14, marginBottom:14 }}>
            <div style={{ fontSize:12, fontWeight:600, marginBottom:8 }}>Surface baseline</div>
            <div style={{ display:"flex", gap:8 }}>
              {[{id:"ocean",icon:"🌊",label:"All ocean",desc:"Earth-like — land rises from sea"},
                {id:"land",icon:"🏔",label:"All land",desc:"Moon-like — craters, no ocean"}].map(opt => (
                <div key={opt.id} onClick={() => updateWorld(world.id, { surfaceType: opt.id })}
                  style={{ flex:1, padding:"10px 8px", borderRadius:8, cursor:"pointer", textAlign:"center",
                    border:`1.5px solid ${(world.surfaceType||"ocean")===opt.id?T.ui.accent:T.ui.border}`,
                    background:(world.surfaceType||"ocean")===opt.id?T.ui.accent+"22":"transparent" }}>
                  <div style={{ fontSize:22, marginBottom:4 }}>{opt.icon}</div>
                  <div style={{ fontSize:11, fontWeight:600 }}>{opt.label}</div>

          <div style={{ fontSize:11, color:T.ui.muted, marginBottom:14 }}>

          <div style={{ display:"flex", justifyContent:"flex-end" }}>

      )}
    </div>
  );
}

function CustomTypeModal({ T, onClose, onAdd }) {
  const [name, setName] = useState("");
  const [cat, setCat] = useState("landmark");
  const [color, setColor] = useState("#888888");
  const [zoneColor, setZoneColor] = useState("#aaaaaa");
  const [iconMode, setIconMode] = useState("emoji"); // emoji | upload | sketch
  const [glyph, setGlyph] = useState("⭐");
  const [uploadedDataUrl, setUploadedDataUrl] = useState(null);
  const sketchRef = useRef(null);
  const sketchDrawing = useRef(false);

  const handleAdd = () => {
    if (!name.trim()) return;
    const iconSrc = iconMode === "upload" && uploadedDataUrl
      ? null : null; // stored as dataUrl on the type
    const nt = {
      id: "custom_" + newId(), name: name.trim(), cat, color, zoneColor,
      glyph: iconMode === "emoji" ? glyph : null,
      uploadedDataUrl: iconMode === "upload" ? uploadedDataUrl : null,
      sketchDataUrl: iconMode === "sketch" ? (sketchRef.current?.toDataURL()) : null,
    };
    onAdd(nt);
    onClose();
  };

  const sketchStart = e => {
    sketchDrawing.current = true;
    const r = sketchRef.current.getBoundingClientRect();
    const ctx = sketchRef.current.getContext("2d");
    ctx.beginPath(); ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
  };
  const sketchMove = e => {
    if (!sketchDrawing.current) return;
    const r = sketchRef.current.getBoundingClientRect();
    const ctx = sketchRef.current.getContext("2d");
    ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
    ctx.strokeStyle = "#222"; ctx.lineWidth = 2.5; ctx.lineCap = "round";
    ctx.stroke();
  };
  const sketchEnd = () => { sketchDrawing.current = false; };
  const clearSketch = () => {
    const c = sketchRef.current; if (!c) return;
    c.getContext("2d").clearRect(0, 0, c.width, c.height);
  };

  const tabStyle = active => ({
    flex:1, padding:"5px 4px", fontSize:11, border:"none",
    background:active ? T.ui.bg : "transparent",
    color:active ? T.ui.accent : T.ui.muted,
    borderBottom:active ? `2px solid ${T.ui.accent}` : "2px solid transparent",
    cursor:"pointer", fontFamily:T.font,
  });

  return (
    <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:80 }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background:T.ui.panel, border:`1px solid ${T.ui.border}`, borderRadius:10, padding:20, width:360, color:T.ui.text, fontFamily:T.font }}>
        <div style={{ fontWeight:600, fontSize:15, marginBottom:14 }}>Create custom type</div>
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          <label style={{ fontSize:12 }}>Name
            <input value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Crystal Cavern"
              style={{ display:"block", width:"100%", marginTop:4, padding:"6px 8px", fontSize:12, border:`1px solid ${T.ui.border}`, borderRadius:5, background:T.ui.bg, color:T.ui.text, boxSizing:"border-box" }} />
          </label>
          <label style={{ fontSize:12 }}>Category
            <select value={cat} onChange={e => setCat(e.target.value)}
              style={{ display:"block", width:"100%", marginTop:4, padding:"6px 8px", fontSize:12, border:`1px solid ${T.ui.border}`, borderRadius:5, background:T.ui.bg, color:T.ui.text }}>
              <option value="terrain">Terrain zone</option>
              <option value="water">Water body</option>
              <option value="landmark">Landmark / icon</option>
            </select>
          </label>
          <div style={{ fontSize:12 }}>Icon
            <div style={{ display:"flex", borderBottom:`1px solid ${T.ui.border}`, marginTop:6, marginBottom:8 }}>
              <button style={tabStyle(iconMode==="emoji")} onClick={() => setIconMode("emoji")}>Emoji</button>
              <button style={tabStyle(iconMode==="upload")} onClick={() => setIconMode("upload")}>Upload image</button>
              <button style={tabStyle(iconMode==="sketch")} onClick={() => setIconMode("sketch")}>Sketch</button>
            </div>
            {iconMode === "emoji" && (
              <div style={{ display:"flex", flexWrap:"wrap", gap:3, maxHeight:120, overflowY:"auto", padding:4, border:`1px solid ${T.ui.border}`, borderRadius:6 }}>
                {PREFAB_ICONS.map(g => (
                  <button key={g} onClick={() => setGlyph(g)}
                    style={{ fontSize:18, background:g===glyph?T.ui.accent+"22":"none", border:g===glyph?`1.5px solid ${T.ui.accent}`:"1px solid transparent", borderRadius:4, padding:3, cursor:"pointer" }}>{g}</button>
                ))}
              </div>
            )}
            {iconMode === "upload" && (
              <div style={{ textAlign:"center", padding:"12px 0" }}>
                {uploadedDataUrl
                  ? <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
                      <img src={uploadedDataUrl} alt="uploaded" style={{ width:60, height:60, objectFit:"contain", border:`1px solid ${T.ui.border}`, borderRadius:6, background:"transparent" }} />
                      <button onClick={() => setUploadedDataUrl(null)} style={{ fontSize:11, color:T.ui.muted, background:"none", border:"none", cursor:"pointer" }}>Remove</button>
                    </div>
                  : <label style={{ cursor:"pointer", display:"inline-block", padding:"8px 16px", border:`1px dashed ${T.ui.border}`, borderRadius:6, fontSize:12, color:T.ui.muted }}>
                      Click to choose an image
                      <input type="file" accept="image/*" style={{ display:"none" }} onChange={e => {
                        const file = e.target.files?.[0]; if (!file) return;
                        const reader = new FileReader();
                        reader.onload = ev => setUploadedDataUrl(ev.target.result);
                        reader.readAsDataURL(file);
                      }} />
                    </label>}
              </div>
            )}
            {iconMode === "sketch" && (
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:6 }}>
                <div style={{ fontSize:10, color:T.ui.muted }}>Draw your icon below (transparent background)</div>
                <canvas ref={sketchRef} width={120} height={120}
                  style={{ border:`1px solid ${T.ui.border}`, borderRadius:6, cursor:"crosshair", background:"transparent", touchAction:"none" }}
                  onMouseDown={sketchStart} onMouseMove={sketchMove} onMouseUp={sketchEnd} onMouseLeave={sketchEnd} />
                <button onClick={clearSketch} style={{ fontSize:11, padding:"3px 10px", border:`1px solid ${T.ui.border}`, borderRadius:4, background:"transparent", color:T.ui.muted, cursor:"pointer" }}>Clear</button>
              </div>
            )}
          </div>
          <div style={{ fontSize:12 }}>Colors
            <div style={{ display:"flex", gap:12, alignItems:"center", marginTop:4 }}>
              <label style={{ fontSize:11, display:"flex", alignItems:"center", gap:4 }}>
                Icon <input type="color" value={color} onChange={e => setColor(e.target.value)} style={{ width:32, height:24, border:"none", cursor:"pointer" }} />
              </label>
              <label style={{ fontSize:11, display:"flex", alignItems:"center", gap:4 }}>
                Zone fill <input type="color" value={zoneColor} onChange={e => setZoneColor(e.target.value)} style={{ width:32, height:24, border:"none", cursor:"pointer" }} />
              </label>
            </div>
          </div>
        </div>
        <div style={{ display:"flex", gap:8, justifyContent:"flex-end", marginTop:14 }}>
          <Btn T={T} onClick={onClose}>Cancel</Btn>
          <Btn T={T} primary onClick={handleAdd}>Add</Btn>
        </div>
      </div>
    </div>
  );
}

function drawMapLbl(ctx, text, x, y, T, large) {
  ctx.font = large ? T.mapFont : `italic 11px Georgia,serif`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 3; ctx.strokeText(text, x, y);
  ctx.fillStyle = "rgba(0,0,0,0.65)"; ctx.fillText(text, x, y);
}

function drawZoneLbl(ctx, pts, name, nameSize) {
  const cx = pts.reduce((a, b) => a + b.x, 0) / pts.length;
  const cy = pts.reduce((a, b) => a + b.y, 0) / pts.length;
  const sz = nameSize || 11;
  ctx.font = `italic ${sz}px Georgia,serif`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.strokeStyle = "rgba(255,255,255,0.45)"; ctx.lineWidth = 2.5; ctx.strokeText(name, cx, cy);
  ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillText(name, cx, cy);
}

// Draws a scale bar in screen space (called after the zoom transform is restored)
function drawScaleBar(ctx, W, H, scale, zoom) {
  const kmPerUnit = scale?.kmPerUnit || 100;
  const unit = scale?.unit || "km";
  // 1 unit = 200px at zoom=1, so at current zoom 1 unit = 200*zoom px
  const pxPerUnit = 200 * zoom;

  // Pick a nice round number of units that gives a bar ~80–130px wide
  const targetPx = 100;
  const rawUnits = targetPx / pxPerUnit;
  // Round to a nice number
  const magnitude = Math.pow(10, Math.floor(Math.log10(rawUnits)));
  const rounded = [1, 2, 5, 10].map(m => m * magnitude).find(v => v * pxPerUnit >= 60) || magnitude;
  const barPx = rounded * pxPerUnit;
  const barKm = rounded * kmPerUnit;
  const label = barKm >= 1000
    ? `${(barKm / 1000).toFixed(barKm % 1000 === 0 ? 0 : 1)}k ${unit}`
    : `${Math.round(barKm)} ${unit}`;

  const x = 14, y = H - 22, h = 5;

  ctx.save();
  // Bar background for readability
  const bx = x - 4, by = y - 12, bw = barPx + 8, bh = 24, br = 3;
  ctx.fillStyle = "rgba(255,255,255,0.7)";
  ctx.beginPath();
  ctx.moveTo(bx + br, by); ctx.lineTo(bx + bw - br, by);
  ctx.arcTo(bx + bw, by, bx + bw, by + br, br);
  ctx.lineTo(bx + bw, by + bh - br);
  ctx.arcTo(bx + bw, by + bh, bx + bw - br, by + bh, br);
  ctx.lineTo(bx + br, by + bh);
  ctx.arcTo(bx, by + bh, bx, by + bh - br, br);
  ctx.lineTo(bx, by + br);
  ctx.arcTo(bx, by, bx + br, by, br);
  ctx.closePath();
  ctx.fill();

  // Bar segments (two-tone)
  for (let i = 0; i < 2; i++) {
    ctx.fillStyle = i === 0 ? "#444" : "#888";
    ctx.fillRect(x + (barPx / 2) * i, y, barPx / 2, h);
  }
  ctx.strokeStyle = "#444"; ctx.lineWidth = 0.8;
  ctx.strokeRect(x, y, barPx, h);

  // End ticks
  [x, x + barPx / 2, x + barPx].forEach(tx => {
    ctx.beginPath(); ctx.moveTo(tx, y - 2); ctx.lineTo(tx, y + h + 2);
    ctx.strokeStyle = "#444"; ctx.lineWidth = 0.8; ctx.stroke();
  });

  // Labels
  ctx.fillStyle = "#222"; ctx.font = "bold 9px sans-serif"; ctx.textBaseline = "bottom"; ctx.textAlign = "center";
  ctx.fillText("0", x, y - 2);
  ctx.fillText(label, x + barPx, y - 2);

  ctx.restore();
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<WorldCartographer />);
